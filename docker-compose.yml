services:
  # ===============================================
  # 1. 外部依赖集成 (Voice & IoT)
  # ===============================================
  funasr-stt:
    image: registry.cn-hangzhou.aliyuncs.com/funasr_repo/funasr:funasr-runtime-sdk-cpu-0.4.6
    container_name: jarvis_funasr_stt
    restart: unless-stopped
    ports:
      - "10095:10095"
    volumes:
      - ./voice-stack/funasr-models:/workspace/models
    working_dir: /workspace/FunASR/runtime
    command: >
      bash -c "bash run_server.sh 
      --model-dir /workspace/models/SenseVoiceSmall 
      --vad-dir /workspace/models/speech_fsmn_vad_zh-cn-16k-common-onnx 
      --port 10095 2>&1 | tee server.log"
    deploy:
      resources:
        limits:
          cpus: "8"
          memory: 2G

  audio_terminal:
    build: .
    image: openclaw-smarthome-audio_terminal:latest
    container_name: jarvis_audio_terminal
    restart: unless-stopped
    command: python /app/audio_terminal/main.py
    privileged: true
    devices:
      - "/dev/snd:/dev/snd"
    volumes:
      - ./audio_terminal:/app/audio_terminal
      - ./audio_terminal/models:/app/audio_terminal/models
      - ./MOSS-TTS-Nano:/app/MOSS-TTS-Nano
      - ./audio_terminal/logs:/app/audio_terminal/logs
      - ./audio_terminal/hallucination_data:/app/audio_terminal/hallucination_data
      - /etc/asound.conf:/etc/asound.conf
    env_file:
      - .env
    deploy:
      resources:
        limits:
          cpus: "10"
          memory: 4G
    environment:
      - HF_HOME=/app/MOSS-TTS-Nano/hf_cache
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - OMP_NUM_THREADS=10
      - MKL_NUM_THREADS=10
    network_mode: "host"

  radar_station:
    build: .
    container_name: jarvis_radar_station
    restart: unless-stopped
    command: python /app/radar_station/radar_server.py
    volumes:
      - ./radar_station:/app/radar_station
    env_file:
      - .env
    network_mode: "host"
